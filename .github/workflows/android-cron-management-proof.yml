name: Android Cron Management Proof

on:
  push:
    branches: [android-cron-management, android-cron-management-clean]
  workflow_dispatch:
    inputs:
      target_ref:
        description: Optional branch, tag, or commit SHA to validate instead of the workflow ref
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: android-cron-management-proof-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: false

jobs:
  proof:
    name: Build APK, prove cron RPCs, and capture screenshot
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.target_ref || github.ref }}
          submodules: false

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            apps/android/**/*.gradle*
            apps/android/**/gradle-wrapper.properties
            apps/android/gradle/libs.versions.toml

      - name: Setup Node runtime
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          install-deps: "true"
          save-actions-cache: "false"

      - name: Real Gateway cron RPC contract proof
        run: |
          set -euo pipefail
          proof_dir="artifacts/cron-proof/real-gateway"
          mkdir -p "$proof_dir"

          export HOME="$RUNNER_TEMP/openclaw-cron-proof-home"
          export OPENCLAW_SKIP_CHANNELS=1
          mkdir -p "$HOME"
          token="cron-proof-token-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          port=18789
          url="ws://127.0.0.1:${port}"

          node scripts/run-node.mjs gateway run \
            --dev \
            --reset \
            --allow-unconfigured \
            --auth token \
            --token "$token" \
            --bind loopback \
            --port "$port" \
            --ws-log compact >"$proof_dir/gateway.log" 2>&1 &
          gateway_pid="$!"
          cleanup_gateway() {
            kill "$gateway_pid" >/dev/null 2>&1 || true
            wait "$gateway_pid" >/dev/null 2>&1 || true
          }
          trap cleanup_gateway EXIT

          for attempt in $(seq 1 60); do
            if node scripts/run-node.mjs gateway call health \
              --url "$url" \
              --token "$token" \
              --json >"$proof_dir/health.json" 2>"$proof_dir/health.err"; then
              break
            fi
            if ! kill -0 "$gateway_pid" >/dev/null 2>&1; then
              echo "Gateway exited before health probe succeeded" >&2
              tail -n 200 "$proof_dir/gateway.log" >&2 || true
              exit 1
            fi
            if [ "$attempt" = "60" ]; then
              echo "Timed out waiting for Gateway health" >&2
              tail -n 200 "$proof_dir/gateway.log" >&2 || true
              exit 1
            fi
            sleep 2
          done

          add_params="$proof_dir/cron-add-params.json"
          proof_at="$(date -u -d '+1 year' '+%Y-%m-%dT%H:%M:%S.000Z')"
          jq -n --arg at "$proof_at" '{
            name: "Android Cron Real Gateway Proof",
            schedule: { kind: "at", at: $at },
            payload: { kind: "systemEvent", text: "Android cron real gateway proof" },
            sessionTarget: "main",
            delivery: { mode: "none" },
            enabled: true
          }' >"$add_params"

          node scripts/run-node.mjs gateway call cron.add \
            --url "$url" \
            --token "$token" \
            --json \
            --params "$(cat "$add_params")" >"$proof_dir/cron-add.json"
          job_id="$(jq -r '.job.id // .id // empty' "$proof_dir/cron-add.json")"
          if [ -z "$job_id" ]; then
            echo "cron.add did not return a job id" >&2
            cat "$proof_dir/cron-add.json" >&2
            exit 1
          fi

          node scripts/run-node.mjs gateway call cron.get \
            --url "$url" \
            --token "$token" \
            --json \
            --params "{\"id\":\"${job_id}\"}" >"$proof_dir/cron-get.json"
          jq -e --arg job_id "$job_id" \
            '.id == $job_id and (.job == null) and (.createdAtMs | type == "number") and (.updatedAtMs | type == "number")' \
            "$proof_dir/cron-get.json" >/dev/null

          node scripts/run-node.mjs gateway call cron.update \
            --url "$url" \
            --token "$token" \
            --json \
            --params "{\"id\":\"${job_id}\",\"patch\":{\"enabled\":false}}" >"$proof_dir/cron-update-disable.json"
          node scripts/run-node.mjs gateway call cron.update \
            --url "$url" \
            --token "$token" \
            --json \
            --params "{\"id\":\"${job_id}\",\"patch\":{\"enabled\":true}}" >"$proof_dir/cron-update-enable.json"
          node scripts/run-node.mjs gateway call cron.run \
            --url "$url" \
            --token "$token" \
            --json \
            --params "{\"id\":\"${job_id}\",\"mode\":\"force\"}" >"$proof_dir/cron-run.json"
          node scripts/run-node.mjs gateway call cron.runs \
            --url "$url" \
            --token "$token" \
            --json \
            --params "{\"id\":\"${job_id}\",\"limit\":20,\"sortDir\":\"desc\"}" >"$proof_dir/cron-runs.json"
          node scripts/run-node.mjs gateway call cron.remove \
            --url "$url" \
            --token "$token" \
            --json \
            --params "{\"id\":\"${job_id}\"}" >"$proof_dir/cron-remove.json"

          commit="$(git rev-parse HEAD)"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat >"$proof_dir/real-gateway-cron-proof.md" <<EOF
          # Real Gateway cron RPC proof

          - Target commit: \`${commit}\`
          - Workflow run: ${run_url}
          - Gateway mode: real OpenClaw Gateway process on GitHub-hosted \`ubuntu-24.04\`, token auth, loopback WebSocket.
          - Verified methods: \`cron.add\`, \`cron.get\`, \`cron.update\` disable/enable, \`cron.run\`, \`cron.runs\`, \`cron.remove\`.
          - Contract check: \`cron.get\` returned the cron job as the root payload object, with numeric \`createdAtMs\` and \`updatedAtMs\`; no stale \`payload.job\` wrapper was accepted.
          - Artifact files: JSON request/response captures plus \`gateway.log\` in this artifact directory.
          EOF

      - name: Cache Android SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.android-sdk
          key: ${{ runner.os }}-android-cron-proof-sdk-v1-cmdline-14742923-platform-36-build-tools-36.0.0-api35-x86_64
          restore-keys: |
            ${{ runner.os }}-android-cron-proof-sdk-v1-

      - name: Setup Android SDK cmdline-tools
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="$HOME/.android-sdk"
          CMDLINE_TOOLS_VERSION="14742923"
          ARCHIVE="commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          URL="https://dl.google.com/android/repository/${ARCHIVE}"

          if [ ! -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
            curl -fsSL "$URL" -o "/tmp/${ARCHIVE}"
            rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
            unzip -q "/tmp/${ARCHIVE}" -d "$ANDROID_SDK_ROOT/cmdline-tools"
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          fi

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/emulator" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null
          license_status="${PIPESTATUS[1]}"
          set -o pipefail
          if [ "$license_status" -ne 0 ]; then
            exit "$license_status"
          fi
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "emulator" \
            "system-images;android-35;google_apis;x86_64"

      - name: Enable KVM for Android emulator
        run: |
          set -euo pipefail
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            ls -l /dev/kvm
          else
            echo "/dev/kvm is not available; emulator will fall back when possible."
          fi

      - name: Build and run Android cron mutation proof
        working-directory: apps/android
        run: ./gradlew --no-daemon --build-cache :app:testPlayDebugUnitTest :app:assemblePlayDebug

      - name: Summarize cron mutation proof
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/cron-proof
          report="apps/android/app/build/test-results/testPlayDebugUnitTest/TEST-ai.openclaw.app.NodeRuntimeCronMutationTest.xml"
          if [ ! -f "$report" ]; then
            echo "NodeRuntimeCronMutationTest report missing" >&2
            exit 1
          fi
          cp "$report" artifacts/cron-proof/
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          report = Path("artifacts/cron-proof/TEST-ai.openclaw.app.NodeRuntimeCronMutationTest.xml")
          root = ET.parse(report).getroot()
          tests = int(root.attrib.get("tests", "0"))
          failures = int(root.attrib.get("failures", "0"))
          errors = int(root.attrib.get("errors", "0"))
          cases = [case.attrib.get("name", "<unknown>") for case in root.findall("testcase")]
          import subprocess
          commit = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          lines = [
              "# Android cron management proof",
              "",
              f"- Commit: `{commit}`",
              f"- Test class: `{root.attrib.get('name', 'unknown')}`",
              f"- Result: tests={tests}, failures={failures}, errors={errors}",
              "- Verified RPC path: Android `NodeRuntime` connected to a gateway WebSocket, then emitted `cron.run`, `cron.update`, and `cron.remove` from admin-scoped controls.",
              "- Verified detail path: Android loaded cron job details from root-object `cron.get` payloads and loaded `cron.runs` history.",
              "- Verified guard path: Android blocks mutation RPCs when the operator session lacks `operator.admin`.",
              "",
              "## Test cases",
          ]
          lines.extend(f"- `{case}`" for case in cases)
          Path("artifacts/cron-proof/cron-mutation-proof.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload cron mutation proof logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-android-cron-mutation-proof
          path: artifacts/cron-proof
          if-no-files-found: error

      - name: Create proof AVD
        run: |
          set -euo pipefail
          export ANDROID_USER_HOME="$HOME/.android"
          export ANDROID_AVD_HOME="$ANDROID_USER_HOME/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo "ANDROID_USER_HOME=$ANDROID_USER_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_AVD_HOME=$ANDROID_AVD_HOME" >> "$GITHUB_ENV"
          echo no | avdmanager create avd \
            --name OpenClawCronProof \
            --package "system-images;android-35;google_apis;x86_64" \
            --device "pixel_6" \
            --force
          avdmanager list avd
          test -f "$ANDROID_AVD_HOME/OpenClawCronProof.ini"
          if [ -e /dev/kvm ]; then
            echo "ANDROID_SCREENSHOT_EMULATOR_ARGS=-wipe-data -no-snapshot -no-snapshot-save -gpu swiftshader_indirect" >> "$GITHUB_ENV"
          else
            echo "ANDROID_SCREENSHOT_EMULATOR_ARGS=-wipe-data -no-snapshot -no-snapshot-save -gpu swiftshader_indirect -no-accel" >> "$GITHUB_ENV"
          fi

      - name: Capture cron management screenshot
        env:
          ANDROID_SCREENSHOT_AVD: OpenClawCronProof
          ANDROID_SCREENSHOT_EMULATOR_TIMEOUT_SECONDS: "420"
          ANDROID_SCREENSHOT_SETTLE_SECONDS: "2"
        run: bash scripts/android-screenshots.sh --locale en-US --skip-build --scene cron

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-android-cron-management-apk
          path: apps/android/app/build/outputs/apk/play/debug/*-play-debug.apk
          if-no-files-found: error

      - name: Upload screenshot evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-android-cron-management-media-evidence
          path: |
            apps/android/fastlane/metadata/android/en-US/images/phoneScreenshots/openclaw-cron.jpg
            apps/android/fastlane/metadata/android/en-US/images/phoneScreenshots/openclaw-cron.raw.png
            .artifacts/android-screenshots/latest/**
          if-no-files-found: error
