name: Proof PR 106826 systemd crash-loop convergence

on:
  push:
    branches:
      - evidence/pr-106826-systemd-proof
  workflow_dispatch:

permissions:
  contents: read

env:
  BEFORE_SHA: 30738a3c3ba3178c66609460bb717e5b6e0f338d
  AFTER_SHA: 6f1d7b0d14cd26bd47dc249278783db4c2185bf4

jobs:
  focused-tests:
    name: Focused and adjacent regression tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out patched head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.AFTER_SHA }}
          fetch-depth: 10

      - name: Set up Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Run focused regression tests
        run: |
          set -euo pipefail
          pnpm test \
            src/gateway/server-startup-config.secrets.test.ts \
            src/gateway/server-startup-config.breaker-secrets.integration.test.ts \
            src/gateway/server-startup-secret-surfaces.test.ts
          pnpm test \
            src/infra/gateway-boot-lifecycle.test.ts

      - name: Run scoped static gates
        run: |
          set -euo pipefail
          git diff --check "$BEFORE_SHA...$AFTER_SHA"
          pnpm check:max-lines-ratchet --base "$BEFORE_SHA"
          pnpm format:check -- \
            src/gateway/server-startup-config.breaker-secrets.integration.test.ts \
            src/gateway/server-startup-config.ts \
            src/gateway/server-startup-secret-surfaces.test.ts \
            src/gateway/server-startup-secret-surfaces.ts \
            src/gateway/server.impl.ts

  systemd-proof:
    name: systemd ${{ matrix.label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: before-channel-secret
            ref: 30738a3c3ba3178c66609460bb717e5b6e0f338d
            scenario: channel
            expected: unavailable
          - label: after-channel-secret
            ref: 6f1d7b0d14cd26bd47dc249278783db4c2185bf4
            scenario: channel
            expected: converged
          - label: after-gateway-auth-secret
            ref: 6f1d7b0d14cd26bd47dc249278783db4c2185bf4
            scenario: gateway-auth
            expected: unavailable
    steps:
      - name: Check out exact candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ matrix.ref }}
          fetch-depth: 1

      - name: Verify exact checkout
        shell: bash
        env:
          EXPECTED_SHA: ${{ matrix.ref }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Set up Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build exact candidate
        run: pnpm build

      - name: Prepare real systemd user session
        shell: bash
        run: |
          set -euo pipefail
          user="$(id -un)"
          uid="$(id -u)"
          test "$(ps -p 1 -o comm= | xargs)" = systemd
          sudo systemctl is-active --quiet systemd-logind.service
          sudo loginctl enable-linger "$user"
          sudo systemctl start "user@${uid}.service"
          runtime_dir="$(loginctl show-user "$user" --property=RuntimePath --value)"
          test -S "$runtime_dir/systemd/private"
          echo "XDG_RUNTIME_DIR=$runtime_dir" >> "$GITHUB_ENV"
          if [[ -S "$runtime_dir/bus" ]]; then
            echo "DBUS_SESSION_BUS_ADDRESS=unix:path=${runtime_dir}/bus" >> "$GITHUB_ENV"
          fi

      - name: Run generated-service convergence proof
        id: proof
        shell: bash
        env:
          PROOF_SCENARIO: ${{ matrix.scenario }}
          PROOF_EXPECTED: ${{ matrix.expected }}
          PROOF_REF: ${{ matrix.ref }}
          PROOF_LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/proof-artifacts"
          state_dir="$RUNNER_TEMP/openclaw-state"
          config_path="$state_dir/openclaw.json"
          secret_path="$state_dir/PROOF_MISSING_TELEGRAM_TOKENS.json"
          telegram_events="$artifact_dir/telegram-events.jsonl"
          telegram_ready="$RUNNER_TEMP/telegram-proof-ready"
          unit="openclaw-gateway.service"
          mkdir -p "$artifact_dir" "$state_dir"
          chmod 700 "$state_dir"

          gateway_port="$(node -e "const n=require('node:net');const s=n.createServer();s.listen(0,'127.0.0.1',()=>{console.log(s.address().port);s.close()})")"
          telegram_port="$(node -e "const n=require('node:net');const s=n.createServer();s.listen(0,'127.0.0.1',()=>{console.log(s.address().port);s.close()})")"
          proof_auth="proof-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${RANDOM}"
          alpha_v1="100001:proof-alpha-v1"
          beta_v1="100002:proof-beta-v1"
          echo "::add-mask::$proof_auth"
          echo "::add-mask::$alpha_v1"
          echo "::add-mask::$beta_v1"

          cat > "$RUNNER_TEMP/telegram-proof-server.mjs" <<'NODE'
          import crypto from "node:crypto";
          import fs from "node:fs";
          import http from "node:http";

          const port = Number(process.env.TELEGRAM_PROOF_PORT);
          const eventsPath = process.env.TELEGRAM_PROOF_EVENTS;
          const readyPath = process.env.TELEGRAM_PROOF_READY;
          let sequence = 0;
          const append = (event) => {
            fs.appendFileSync(
              eventsPath,
              `${JSON.stringify({ sequence: ++sequence, at: Date.now(), ...event })}\n`,
            );
          };
          const digest = (value) =>
            crypto.createHash("sha256").update(value ?? "").digest("hex");

          const server = http.createServer(async (request, response) => {
            const match = request.url?.match(/^\/bot([^/]+)\/([^?]+)/u);
            const token = match?.[1] ?? "";
            const method = match?.[2] ?? "unknown";
            append({ event: "request", method, tokenSha256: digest(token) });
            if (method === "getUpdates") {
              await new Promise((resolve) => setTimeout(resolve, 100));
            }
            const botId = Number(token.split(":", 1)[0]) || 100001;
            const result =
              method === "getMe"
                ? {
                    id: botId,
                    is_bot: true,
                    first_name: `Proof ${botId}`,
                    username: `proof_${botId}_bot`,
                  }
                : method === "getUpdates" || method === "getMyCommands"
                  ? []
                  : method === "getWebhookInfo"
                    ? { url: "", has_custom_certificate: false, pending_update_count: 0 }
                    : true;
            response.writeHead(200, { "content-type": "application/json" });
            response.end(JSON.stringify({ ok: true, result }));
          });

          server.listen(port, "127.0.0.1", () => {
            fs.writeFileSync(readyPath, String(port));
          });

          const shutdown = () => {
            server.close(() => process.exit(0));
          };
          process.on("SIGTERM", shutdown);
          process.on("SIGINT", shutdown);
          NODE

          TELEGRAM_PROOF_PORT="$telegram_port" \
          TELEGRAM_PROOF_EVENTS="$telegram_events" \
          TELEGRAM_PROOF_READY="$telegram_ready" \
            node "$RUNNER_TEMP/telegram-proof-server.mjs" &
          telegram_server_pid=$!
          for _ in $(seq 1 50); do
            test -f "$telegram_ready" && break
            sleep 0.1
          done
          test -f "$telegram_ready"

          if [[ "$PROOF_SCENARIO" == "channel" ]]; then
            cat > "$config_path" <<EOF
          {
            "secrets": {
              "providers": {
                "proof-file": {
                  "source": "file",
                  "path": "${secret_path}",
                  "mode": "json"
                }
              }
            },
            "gateway": {
              "mode": "local",
              "bind": "loopback",
              "port": ${gateway_port},
              "auth": { "mode": "token", "token": "${proof_auth}" },
              "controlUi": { "enabled": false },
              "tailscale": { "mode": "off" }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "defaultAccount": "alpha",
                "dmPolicy": "disabled",
                "groupPolicy": "disabled",
                "accounts": {
                  "alpha": {
                    "enabled": true,
                    "apiRoot": "http://127.0.0.1:${telegram_port}",
                    "botToken": {
                      "source": "file",
                      "provider": "proof-file",
                      "id": "/alphaToken"
                    }
                  },
                  "beta": {
                    "enabled": true,
                    "apiRoot": "http://127.0.0.1:${telegram_port}",
                    "botToken": {
                      "source": "file",
                      "provider": "proof-file",
                      "id": "/betaToken"
                    }
                  }
                }
              }
            },
            "plugins": {
              "enabled": true,
              "entries": { "telegram": { "enabled": true } }
            },
            "cron": { "enabled": false },
            "browser": { "enabled": false }
          }
          EOF
          else
            cat > "$config_path" <<EOF
          {
            "secrets": { "providers": { "proof-env": { "source": "env" } } },
            "gateway": {
              "mode": "local",
              "bind": "loopback",
              "port": ${gateway_port},
              "auth": { "mode": "token", "token": "${proof_auth}" },
              "controlUi": { "enabled": false },
              "tailscale": { "mode": "off" }
            },
            "cron": { "enabled": false },
            "browser": { "enabled": false }
          }
          EOF
          fi
          chmod 600 "$config_path"

          cleanup() {
            status=$?
            if [[ "$status" -ne 0 && -n "${started_at:-}" ]]; then
              echo "::group::Sanitized service journal"
              journalctl --user -u "$unit" --since "$started_at" --no-pager 2>/dev/null | \
                sed \
                  -e "s#${GITHUB_WORKSPACE}#<workspace>#g" \
                  -e "s#${RUNNER_TEMP}#<runner-temp>#g" \
                  -e "s#${HOME}#<home>#g" \
                  -e "s#${proof_auth}#<redacted>#g" \
                  -e "s#${alpha_v1}#<redacted>#g" \
                  -e "s#${beta_v1}#<redacted>#g" | \
                tail -n 200 || true
              echo "::endgroup::"
            fi
            systemctl --user stop "$unit" >/dev/null 2>&1 || true
            kill "$telegram_server_pid" >/dev/null 2>&1 || true
            wait "$telegram_server_pid" >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT

          export OPENCLAW_STATE_DIR="$state_dir"
          export OPENCLAW_CONFIG_PATH="$config_path"
          export OPENCLAW_GATEWAY_PORT="$gateway_port"
          export OPENCLAW_SKIP_CRON=1
          node dist/entry.js gateway install --force --json > "$artifact_dir/install.json"
          if [[ "$PROOF_SCENARIO" == "gateway-auth" ]]; then
            node -e '
              const fs = require("node:fs");
              const configPath = process.env.OPENCLAW_CONFIG_PATH;
              const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
              config.gateway.auth.token = {
                source: "env",
                provider: "proof-env",
                id: "PROOF_MISSING_GATEWAY_TOKEN",
              };
              fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
            '
          fi
          systemctl --user daemon-reload
          systemctl --user reset-failed "$unit" || true
          started_at="$(date --iso-8601=seconds)"
          systemctl --user start "$unit"

          if [[ "$PROOF_EXPECTED" == "converged" ]]; then
            for _ in $(seq 1 150); do
              if systemctl --user is-active --quiet "$unit" && \
                curl -fsS "http://127.0.0.1:${gateway_port}/healthz" >/dev/null && \
                curl -fsS "http://127.0.0.1:${gateway_port}/readyz" >/dev/null && \
                journalctl --user -u "$unit" --since "$started_at" --no-pager | \
                  grep -Fq "restart-loop breaker tripped"; then
                break
              fi
              sleep 1
            done
            systemctl --user is-active --quiet "$unit"
            curl -fsS "http://127.0.0.1:${gateway_port}/healthz" >/dev/null
            curl -fsS "http://127.0.0.1:${gateway_port}/readyz" >/dev/null
            journalctl --user -u "$unit" --since "$started_at" --no-pager | \
              grep -Fq "restart-loop breaker tripped"

          else
            sleep 45
          fi

          journalctl --user -u "$unit" --since "$started_at" --no-pager > "$artifact_dir/journal.raw"
          missing_id="PROOF_MISSING_TELEGRAM_TOKENS.json"
          if [[ "$PROOF_SCENARIO" == "gateway-auth" ]]; then
            missing_id="PROOF_MISSING_GATEWAY_TOKEN"
          fi
          missing_count="$(grep -c "$missing_id" "$artifact_dir/journal.raw" || true)"
          breaker_count="$(grep -c 'restart-loop breaker tripped' "$artifact_dir/journal.raw" || true)"
          post_breaker_missing_count="$(awk -v id="$missing_id" '
            /restart-loop breaker tripped/ { breaker_seen = 1 }
            breaker_seen && index($0, id) { missing_count++ }
            END { print missing_count + 0 }
          ' "$artifact_dir/journal.raw")"
          restarts_before="$(systemctl --user show "$unit" -p NRestarts --value)"
          sleep 12
          restarts_after="$(systemctl --user show "$unit" -p NRestarts --value)"
          active_state="$(systemctl --user show "$unit" -p ActiveState --value)"
          sub_state="$(systemctl --user show "$unit" -p SubState --value)"
          result="$(systemctl --user show "$unit" -p Result --value)"

          {
            echo "label=$PROOF_LABEL"
            echo "scenario=$PROOF_SCENARIO"
            echo "tested_sha=$(git rev-parse HEAD)"
            echo "expected=$PROOF_EXPECTED"
            echo "active_state=$active_state"
            echo "sub_state=$sub_state"
            echo "result=$result"
            echo "missing_secret_failures=$missing_count"
            echo "breaker_events=$breaker_count"
            echo "post_breaker_missing_secret_failures=$post_breaker_missing_count"
            echo "restarts_before_stability_window=$restarts_before"
            echo "restarts_after_stability_window=$restarts_after"
            if [[ "$PROOF_EXPECTED" == "converged" ]]; then
              echo "safe_mode_control_plane_convergence=success"
              echo "suppressed_channel_secret_no_longer_fatal=success"
            fi
            echo "systemd_version=$(systemctl --version | head -1)"
            echo "runner_image=${ImageOS:-unknown}"
          } | tee "$artifact_dir/summary.txt"

          sed \
            -e "s#${GITHUB_WORKSPACE}#<workspace>#g" \
            -e "s#${RUNNER_TEMP}#<runner-temp>#g" \
            -e "s#${HOME}#<home>#g" \
            -e "s#${proof_auth}#<redacted>#g" \
            -e "s#${alpha_v1}#<redacted>#g" \
            -e "s#${beta_v1}#<redacted>#g" \
            "$artifact_dir/journal.raw" > "$artifact_dir/journal.txt"
          rm "$artifact_dir/journal.raw" "$artifact_dir/install.json"

          test "$missing_count" -ge 3
          test "$breaker_count" -ge 1
          if [[ "$PROOF_EXPECTED" == "converged" ]]; then
            test "$post_breaker_missing_count" -eq 0
            test "$active_state" = "active"
            test "$sub_state" = "running"
            test "$restarts_before" -eq "$restarts_after"
            curl -fsS "http://127.0.0.1:${gateway_port}/healthz" >/dev/null
            curl -fsS "http://127.0.0.1:${gateway_port}/readyz" >/dev/null
            node dist/entry.js gateway status \
              --url "ws://127.0.0.1:${gateway_port}" \
              --token "$proof_auth" \
              --require-rpc \
              --timeout 30000 \
              --json >/dev/null
          else
            test "$post_breaker_missing_count" -ge 1
            if curl -fsS --max-time 2 "http://127.0.0.1:${gateway_port}/healthz" >/dev/null 2>&1; then
              echo "unexpectedly reached the control plane" >&2
              exit 1
            fi
          fi

      - name: Upload sanitized proof
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: proof-pr-106826-${{ matrix.label }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/proof-artifacts
          if-no-files-found: warn
          retention-days: 30
