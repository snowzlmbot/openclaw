name: Issue 96452 Focused Proof

on:
  push:
    branches:
      - proof/codex-computer-use-empty-approval
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-vitest:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run focused Computer Use approval bridge tests
        run: |
          pnpm exec vitest run \
            extensions/codex/src/app-server/elicitation-bridge.test.ts \
            -t "Computer Use|empty form schema"
